<div class="dashboard-page">
  <!-- Page Header -->
  <section class="page-header">
    <h2>Welcome, Rasul Ahmed Khan</h2>
  </section>

  <!-- Metrics Section -->
  <section class="metrics-section">
    <div class="metric-card card-base">
      <span class="metric-label">Total Sales</span>
      <span class="metric-value">$4,672.20 <span class="metric-change up">+27%</span></span>
    </div>
    <div class="metric-card card-base">
      <span class="metric-label">Expenses Summary</span>
      <span class="metric-value">204,765 <span class="metric-change up">+32%</span></span>
    </div>
    <div class="metric-card card-base">
      <span class="metric-label">Invoices Summary</span>
      <span class="metric-value">12,045 <span class="metric-change up">+15%</span></span>
    </div>
  </section>

  <!-- Reach & Leaderboard -->
  <section class="grid-section">
    <div class="chart-card card-base">
      <h3 class="card-title">Reach</h3>
      <div id="regions_div" style="width: 100%; height: 200px;"></div>
    </div>

    <div class="leaderboard-section card-base">
      <h3 class="card-title">Leaderboard</h3>
      <div class="leaderboard-controls">
        <span class="active">View All</span>
        <span>Team A</span>
      </div>
      <div class="leaderboard-list">
        <div class="leaderboard-item"><span class="rank">#1</span><span>Alaska Young</span><span class="score">99%</span></div>
        <div class="leaderboard-item"><span class="rank">#2</span><span>Alex Shotay</span><span class="score">90%</span></div>
        <div class="leaderboard-item"><span class="rank">#3</span><span>Mina Lee</span><span class="score">87%</span></div>
        <div class="leaderboard-item"><span class="rank">#4</span><span>Mesut Ozil</span><span class="score">86%</span></div>
        <div class="leaderboard-item"><span class="rank">#5</span><span>Kai Havertz</span><span class="score">49%</span></div>
      </div>
    </div>
  </section>

  <!-- Charts Section -->
  <section class="charts-section">
    <div class="chart-card card-base">
      <h3 class="card-title">Performance Overview</h3>
      <app-Verticalcharts></app-Verticalcharts>
    </div>
    <div class="chart-card card-base">
      <h3 class="card-title">Upload Summary</h3>
      <app-upload></app-upload>
    </div>
  </section>

  <!-- Line Chart -->
  <section class="linechart-section card-base">
    <h3 class="card-title">Weekly Progress</h3>
    <app-linechart></app-linechart>
  </section>
</div>
