<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-brand">Know be-4</h1>
      <p class="auth-subtitle">Reset your password</p>
      <p class="auth-description">Enter your email to receive a reset link.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="input-group">
        <input pInputText type="email" placeholder="Email Address" [(ngModel)]="email" name="email" required>
      </div>
      <button type="submit" class="auth-submit-btn">Send Reset Link</button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Back to Login</a>
    </div>
  </div>
</div>
