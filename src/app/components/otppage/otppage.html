<div class="auth-card">
  <div class="auth-header">
    <h1 class="auth-brand">Know be-4</h1>
    <p class="auth-subtitle">OTP Verification</p>
    <p class="auth-description">Enter the code sent to your email.</p>
  </div>

  <form [formGroup]="otpForm" (ngSubmit)="VerifyOtp()" class="auth-form">
    <div class="input-group">
      <input pInputText type="email" placeholder="Email Address" formControlName="email" required>
    </div>

    <div class="otp-inputs">
      <input
        *ngFor="let _ of [1,2,3,4]; let i = index"
        type="tel"
        maxlength="1"
        class="otp-box"
        (input)="onOtpInput($event, i)"
        (keydown)="onOtpKeydown($event, i)"
        [attr.data-index]="i"
        autocomplete="one-time-code"
      />
    </div>

    <button type="submit" class="auth-submit-btn" [disabled]="!otpForm.valid">Verify OTP</button>
  </form>

  <div class="auth-links">
    <button type="button" class="resend-btn" (click)="SendOtp()">Resend Code</button>
    <span class="auth-links-sep">|</span>
    <a routerLink="/login">Back to Login</a>
  </div>
</div>
